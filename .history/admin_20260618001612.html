<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudQ - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="row">
            <div class="col-12 mb-4">
                <h2 class="fw-bold text-danger">CloudQ Operator Dashboard</h2>
                <p class="text-muted">Manage real-time queue tracks efficiently</p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card p-4">
                    <h5 class="fw-bold mb-3">Counter Desk Control</h5>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select id="adminCategory" class="form-select">
                            <option value="">-- Select --</option>
                            <option value="clinic">Clinic</option>
                            <option value="bank">Bank</option>
                            <option value="restaurant">Restaurant</option>
                            <option value="salon">Salon</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Assign Desk Station</label>
                        <select id="adminBusiness" class="form-select" disabled>
                            <option value="">-- Choose Category First --</option>
                        </select>
                    </div>
                    <button id="callNextBtn" class="btn btn-success btn-lg w-100 py-3 fw-bold" disabled>CALL NEXT CUSTOMER</button>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4 text-center">
                    <h5 class="text-start fw-bold mb-4">Live Performance Monitor</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="p-4 bg-light rounded">
                                <small class="text-muted text-uppercase d-block fw-semibold">Now Calling</small>
                                <h2 id="adminCurrent" class="display-3 fw-bold text-primary">-</h2>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="p-4 bg-light rounded">
                                <small class="text-muted text-uppercase d-block fw-semibold">Next Up in Queue</small>
                                <h2 id="adminNext" class="display-3 fw-bold text-secondary">-</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
