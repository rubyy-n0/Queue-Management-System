<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudQ - TV Monitor Display</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="tv-display d-flex align-items-center">
    <div class="container text-center py-4">
        <div class="row mb-4 justify-content-center">
            <div class="col-md-6">
                <label class="text-uppercase tracking-wider fw-bold small mb-2" style="color: #829AB1; letter-spacing: 2px;">Select Station Feed</label>
                <select id="tvStationSelect" class="form-select form-select-lg mx-auto bg-dark text-light border-secondary text-center rounded-pill px-4" style="background-color: #102A43 !important; border-color: rgba(255,255,255,0.1) !important;">
                    <option value="">-- Select Display Feed --</option>
                    <option value="clinic_aiu">Clinic AIU Screen</option>
                    <option value="clinic_medicare">MediCare Health Screen</option>
                    <option value="clinic_wellness">Wellness Family Screen</option>
                    <option value="bank_maybank">Maybank Service Screen</option>
                    <option value="bank_cimb">CIMB Bank Screen</option>
                    <option value="bank_public">Public Bank Screen</option>
                    <option value="restaurant_mamak">Mamak Kitchen Screen</option>
                    <option value="restaurant_bistro">Spice Bistro Screen</option>
                    <option value="restaurant_cafe">Central Cafe Screen</option>
                    <option value="salon_beauty">Beauty Salon Screen</option>
                    <option value="salon_cuts">Pro Cuts Barber Screen</option>
                    <option value="salon_spa">Serenity Spa Screen</option>
                </select>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-8">
                <div class="tv-container p-5">
                    <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
                        <span class="spinner-grow spinner-grow-sm brand-text-orange" role="status"></span>
                        <h1 class="display-6 fw-extrabold text-uppercase m-0 tracking-widest" style="color: #BAC7D5; font-weight: 800; letter-spacing: 6px;">NOW SERVING</h1>
                    </div>
                    
                    <div id="tvNumberDisplay" class="tv-number my-2">---</div>
                    
                    <div class="h3 fw-medium pt-4 mt-2" style="border-top: 2px dashed rgba(255,255,255,0.1); color: #9FB3C8;">
                        Please proceed to <span class="brand-text-orange fw-bold">counter area</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, doc, onSnapshot } from "./firebase-config.js";
        
        const tvStationSelect = document.getElementById("tvStationSelect");
        const tvNumberDisplay = document.getElementById("tvNumberDisplay");
        let tvUnsubscribe = null;

        tvStationSelect.addEventListener("change", (e) => {
            const id = e.target.value;
            if (tvUnsubscribe) tvUnsubscribe();

            if (id) {
                tvUnsubscribe = onSnapshot(doc(db, "queues", id), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.current === 0) {
                            tvNumberDisplay.textContent = "WAIT";
                        } else {
                            tvNumberDisplay.textContent = `${data.prefix}${String(data.current).padStart(3, '0')}`;
                        }
                    }
                });
            } else {
                tvNumberDisplay.textContent = "---";
            }
        });
    </script>
</body>
</html>
