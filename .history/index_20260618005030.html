<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudQ - Ticket System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-clean py-3 mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark fs-3" href="#">Cloud<span style="color: var(--brand-blue);">Q</span></a>
            <span class="text-muted fw-semibold small">📍 Digital Concierge Desktop</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            
            <div class="col-lg-6">
                <div class="desktop-hero-card p-4 p-xl-5">
                    <h2 class="fw-bold mb-2">Welcome to CloudQ</h2>
                    <p class="text-muted mb-4">Please pick a division, choose your preferred station agent, and click below to reserve your space instantly.</p>
                    
                    <label class="form-label fw-bold text-uppercase small text-muted">1. Service Division</label>
                    <div class="category-tab-container mb-4">
                        <button class="category-tab-btn active" data-category="clinic">🏥 Clinic</button>
                        <button class="category-tab-btn" data-category="bank">🏦 Bank</button>
                        <button class="category-tab-btn" data-category="restaurant">🍔 Food</button>
                        <button class="category-tab-btn" data-category="salon">💇 Salon</button>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-uppercase small text-muted">2. Assigned Business</label>
                        <select id="businessSelect" class="form-select custom-select-light form-select-lg"></select>
                    </div>

                    <button id="getTicketBtn" class="btn btn-brand-primary btn-lg w-100 py-3 text-uppercase">Generate Ticket Node</button>
                </div>
            </div>

            <div class="col-lg-6">
                <div id="ticketDisplay" class="desktop-hero-card p-4 p-xl-5 text-center d-none h-100 d-flex flex-column justify-content-center">
                    <span class="badge bg-warning bg-opacity-10 text-dark px-3 py-2 rounded-pill mx-auto fw-bold mb-2" id="displayBusinessName">---</span>
                    <h4 class="text-muted small text-uppercase tracking-wider">Your Assigned Token</h4>
                    
                    <div class="large-queue-display my-2" id="myNumber">----</div>
                    
                    <hr class="my-4" style="border-color: #e2e8f0;">

                    <div class="row g-3">
                        <div class="col-4">
                            <div class="metric-box">
                                <small class="text-muted d-block uppercase-track">Now Serving</small>
                                <span class="fs-4 fw-bold text-primary" id="currentServing">-</span>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="metric-box">
                                <small class="text-muted d-block uppercase-track">Queue Behind</small>
                                <span class="fs-4 fw-bold" id="peopleAhead">-</span>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="metric-box">
                                <small class="text-muted d-block uppercase-track">Estimated Wait</small>
                                <span class="fs-4 fw-bold text-success" id="waitTime">-</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
