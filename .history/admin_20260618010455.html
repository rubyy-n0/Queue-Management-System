<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudQ - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="row mb-5 align-items-center">
            <div class="col-12">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <span class="fs-4 fw-bold brand-text-blue">Cloud</span><span class="fs-4 fw-bold px-2 py-1 bg-warning rounded text-white btn-cq-orange">Q</span>
                </div>
                <h2 class="fw-black brand-text-blue m-0" style="font-weight: 800;">Operator Control Center</h2>
                <p class="text-muted m-0">Manage real-time queue tracks efficiently</p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-5 col-lg-4">
                <div class="card cq-card p-4 border-top border-4 border-primary">
                    <h5 class="fw-bold brand-text-blue mb-4">Counter Desk Control</h5>
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Category</label>
                        <select id="adminCategory" class="form-select rounded-3">
                            <option value="">-- Select --</option>
                            <option value="clinic">Clinic</option>
                            <option value="bank">Bank</option>
                            <option value="restaurant">Restaurant</option>
                            <option value="salon">Salon</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Assign Desk Station</label>
                        <select id="adminBusiness" class="form-select rounded-3" disabled>
                            <option value="">-- Choose Category First --</option>
                        </select>
                    </div>
                    <button id="callNextBtn" class="btn btn-cq-orange btn-lg w-100 py-3 shadow" disabled>CALL NEXT CUSTOMER</button>
                </div>
            </div>

            <div class="col-md-7 col-lg-8">
                <div class="card cq-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold text-secondary m-0">Live Performance Monitor</h5>
                        <span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3 py-2 fw-semibold">● System Live</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <div class="p-4 stat-box-orange text-center">
                                <small class="text-uppercase tracking-wider fw-bold text-secondary d-block mb-2">Now Calling</small>
                                <h2 id="adminCurrent" class="display-2 fw-black brand-text-orange m-0" style="font-weight: 800;">-</h2>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="p-4 stat-box-blue text-center">
                                <small class="text-uppercase tracking-wider fw-bold text-secondary d-block mb-2">Next Up in Queue</small>
                                <h2 id="adminNext" class="display-2 fw-black brand-text-blue m-0" style="font-weight: 800;">-</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
