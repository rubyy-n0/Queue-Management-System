<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudQ - Get Your Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center mb-4">
            <div class="col-md-6 text-center">
                <div class="d-inline-flex align-items-center gap-2 mb-2">
                    <h1 class="fw-black brand-text-blue display-4 m-0" style="font-weight: 900;">Cloud<span class="brand-text-orange">Q</span></h1>
                </div>
                <p class="text-muted tracking-wide text-uppercase small fw-bold">Real-Time Queue Management</p>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card cq-card p-4 mb-4">
                    <h4 class="mb-4 fw-bold brand-text-blue text-center">Select Service Token</h4>
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Category</label>
                        <select id="categorySelect" class="form-select rounded-3">
                            <option value="">-- Choose Category --</option>
                            <option value="clinic">Clinic</option>
                            <option value="bank">Bank</option>
                            <option value="restaurant">Restaurant</option>
                            <option value="salon">Salon</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Business Partner</label>
                        <select id="businessSelect" class="form-select rounded-3" disabled>
                            <option value="">-- Select Category First --</option>
                        </select>
                    </div>
                    <button id="getTicketBtn" class="btn btn-cq-primary btn-lg w-100 py-3 rounded-3 shadow-sm" disabled>Generate Ticket</button>
                </div>

                <div id="ticketDisplay" class="card cq-card p-4 text-center border-2 border-warning d-none" style="border-color: var(--cq-orange-primary) !important;">
                    <span class="badge rounded-pill bg-warning text-white btn-cq-orange mx-auto mb-2 px-3 py-2 text-uppercase tracking-wider" style="font-size: 0.75rem;">Active Token</span>
                    <h5 class="text-muted text-uppercase small tracking-wide fw-bold mt-2">Your Ticket Number</h5>
                    <div id="myNumber" class="queue-number my-2">----</div>
                    
                    <hr class="my-4 opacity-25">
                    
                    <div class="row g-2">
                        <div class="col-6 border-end">
                            <small class="text-muted d-block mb-1">Now Serving</small>
                            <span id="currentServing" class="fs-3 fw-bold brand-text-blue">-</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block mb-1">People Ahead</small>
                            <span id="peopleAhead" class="fs-3 fw-bold brand-text-orange">-</span>
                        </div>
                    </div>
                    
                    <div class="mt-4 bg-light p-3 rounded-3 border-start border-3 border-warning" style="background-color: var(--cq-blue-light) !important;">
                        <span class="text-secondary d-flex align-items-center justify-content-center gap-2">
                            ⏱ Est. Waiting Time: <strong id="waitTime" class="brand-text-blue">- mins</strong>
                        </span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
