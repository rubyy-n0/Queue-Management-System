<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudQ - Operator Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-clean py-3 mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark fs-3" href="#">Cloud<span style="color: var(--brand-blue);">Q</span> Dashboard</a>
            <span class="badge bg-primary text-white py-2 px-3 fw-medium">Operator View</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            
            <div class="col-lg-4">
                <div class="desktop-hero-card p-4">
                    <h4 class="fw-bold mb-3">Desk Station Settings</h4>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted text-uppercase">Category</label>
                        <select id="adminCategory" class="form-select custom-select-light">
                            <option value="">-- Choose Segment --</option>
                            <option value="clinic">Clinic</option>
                            <option value="bank">Bank</option>
                            <option value="restaurant">Restaurant</option>
                            <option value="salon">Salon</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted text-uppercase">Select Business Feed</label>
                        <select id="adminBusiness" class="form-select custom-select-light" disabled>
                            <option value="">-- Select Category First --</option>
                        </select>
                    </div>

                    <button id="callNextBtn" class="btn btn-brand-yellow btn-lg w-100 py-3 fw-bold text-uppercase" disabled>Call Next Ticket</button>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="desktop-hero-card p-4 h-100 d-flex flex-column justify-content-between">
                    <h4 class="fw-bold mb-4 text-muted small text-uppercase">Live Performance Monitors</h4>
                    
                    <div class="row my-auto g-3 text-center">
                        <div class="col-md-6">
                            <div class="p-5 border rounded-3 bg-light">
                                <span class="text-uppercase small text-muted fw-bold d-block mb-2">Currently At Window</span>
                                <h1 class="display-2 fw-bold text-primary" id="adminCurrent">-</h1>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-5 border rounded-3 bg-light">
                                <span class="text-uppercase small text-muted fw-bold d-block mb-2">Up Next In Line</span>
                                <h1 class="display-2 fw-bold text-secondary" id="adminNext">-</h1>
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-muted small pt-3 border-top mt-4">
                        ● Live synchronized connection active
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
