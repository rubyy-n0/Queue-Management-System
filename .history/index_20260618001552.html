<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudQ - Get Your Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center mb-4">
                <h1 class="fw-bold text-primary">CloudQ</h1>
                <p class="text-muted">Real-Time Queue Management</p>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 mb-4">
                    <h4 class="mb-3 fw-semibold">Select Service</h4>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select id="categorySelect" class="form-select">
                            <option value="">-- Choose Category --</option>
                            <option value="clinic">Clinic</option>
                            <option value="bank">Bank</option>
                            <option value="restaurant">Restaurant</option>
                            <option value="salon">Salon</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Business</label>
                        <select id="businessSelect" class="form-select" disabled>
                            <option value="">-- Select Category First --</option>
                        </select>
                    </div>
                    <button id="getTicketBtn" class="btn btn-primary btn-lg w-100" disabled>Generate Ticket</button>
                </div>

                <div id="ticketDisplay" class="card p-4 text-center d-none">
                    <h5 class="text-muted text-uppercase">Your Ticket Number</h5>
                    <div id="myNumber" class="queue-number my-2">----</div>
                    <hr>
                    <div class="row mt-3">
                        <div class="col-6 border-end">
                            <small class="text-muted d-block">Now Serving</small>
                            <span id="currentServing" class="fs-4 fw-bold text-success">-</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block">People Ahead</small>
                            <span id="peopleAhead" class="fs-4 fw-bold text-danger">-</span>
                        </div>
                    </div>
                    <div class="mt-3 bg-light p-2 rounded">
                        <small class="text-muted">Est. Waiting Time: <strong id="waitTime">- mins</strong></small>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
